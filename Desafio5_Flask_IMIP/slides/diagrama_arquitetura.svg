<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 720" width="100%" height="100%" style="background-color: #0b0f19; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradiente do Título Principal -->
    <linearGradient id="grad-title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Gradientes de Camadas -->
    <linearGradient id="grad-domain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e1065" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <linearGradient id="grad-ports" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#431407" />
      <stop offset="100%" stop-color="#2d0f02" />
    </linearGradient>

    <linearGradient id="grad-adapters" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>

    <!-- Sombra suave para elementos -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Marcadores de Setas -->
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#c084fc"/>
    </marker>
  </defs>

  <!-- Grelha de Fundo Técnica (Sutil) -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 1150,50 M 0,100 L 1150,100 M 0,150 L 1150,150 M 0,200 L 1150,200 M 0,250 L 1150,250 M 0,300 L 1150,300 M 0,350 L 1150,350 M 0,400 L 1150,400 M 0,450 L 1150,450 M 0,500 L 1150,500 M 0,550 L 1150,550 M 0,600 L 1150,600 M 0,650 L 1150,650" />
    <path d="M 100,0 L 100,720 M 200,0 L 200,720 M 300,0 L 300,720 M 400,0 L 400,720 M 500,0 L 500,720 M 600,0 L 600,720 M 700,0 L 700,720 M 800,0 L 800,720 M 900,0 L 900,720 M 1000,0 L 1000,720 M 1100,0 L 1100,720" />
  </g>

  <!-- Cabeçalho Principal -->
  <text x="575" y="45" text-anchor="middle" font-size="26" font-weight="900" fill="url(#grad-title)" letter-spacing="1">ALFABETIZAI — DIAGRAMA DE ARQUITETURA HEXAGONAL</text>
  <text x="575" y="70" text-anchor="middle" font-size="13" fill="#64748b" font-weight="500">Mapeamento de Fluxos, Módulos e Relações de Dependência (Ports &amp; Adapters)</text>

  <!-- ==================== CAMADA 1: APRESENTAÇÃO (UI) ==================== -->
  <g filter="url(#shadow)">
    <rect x="40" y="240" width="180" height="220" rx="14" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <rect x="40" y="240" width="180" height="40" rx="14" fill="#1e293b" opacity="0.8"/>
    <text x="130" y="266" text-anchor="middle" font-size="14" font-weight="800" fill="#38bdf8" letter-spacing="0.5">APRESENTAÇÃO</text>
    
    <text x="130" y="315" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="700">Navegador Web</text>
    <text x="130" y="335" text-anchor="middle" font-size="11" fill="#94a3b8">Interface do Usuário</text>
    
    <path d="M 60 360 L 200 360" stroke="#334155" stroke-width="1"/>
    
    <text x="130" y="385" text-anchor="middle" font-size="12" fill="#cbd5e1">HTML5 / CSS3 / JS</text>
    <text x="130" y="405" text-anchor="middle" font-size="12" fill="#cbd5e1">UI Bootstrap 5</text>
    
    <rect x="65" y="423" width="130" height="22" rx="4" fill="#f43f5e" fill-opacity="0.15" stroke="#f43f5e" stroke-width="0.5"/>
    <text x="130" y="437" text-anchor="middle" font-size="10" font-weight="700" fill="#f43f5e">ATORES: ALUNO / PROF</text>
  </g>

  <!-- ==================== CAMADA 2: DOMÍNIO (NÚCLEO) ==================== -->
  <g filter="url(#shadow)">
    <!-- Contêiner Geral do Domínio -->
    <rect x="260" y="100" width="280" height="520" rx="16" fill="url(#grad-domain)" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 3" fill-opacity="0.95"/>
    <text x="400" y="128" text-anchor="middle" font-size="14" font-weight="900" fill="#d8b4fe" letter-spacing="1">DOMÍNIO (CORE &amp; MODELS)</text>
    
    <!-- Subcaixa: Controle & Rotas Flask -->
    <rect x="280" y="150" width="240" height="195" rx="10" fill="#1e152a" stroke="#c084fc" stroke-width="1"/>
    <text x="400" y="172" text-anchor="middle" font-size="13" font-weight="800" fill="#e9d5ff">Lógica de Controle (Flask)</text>
    <path d="M 300 185 L 500 185" stroke="#3b2b4c" stroke-width="1"/>
    <text x="300" y="208" font-size="12" fill="#f3e8ff" font-weight="700">app.py</text>
    <text x="365" y="208" font-size="11" fill="#a78bfa">Configuração &amp; Setup</text>
    <text x="300" y="233" font-size="12" fill="#f3e8ff" font-weight="700">routes.py</text>
    <text x="375" y="233" font-size="11" fill="#a78bfa">Endpoints &amp; Telas</text>
    <text x="300" y="258" font-size="12" fill="#f3e8ff" font-weight="700">auth.py</text>
    <text x="365" y="258" font-size="11" fill="#a78bfa">Controle de Sessão / Login</text>
    <rect x="295" y="280" width="210" height="52" rx="4" fill="#581c87" fill-opacity="0.3"/>
    <text x="400" y="297" text-anchor="middle" font-size="10" fill="#d8b4fe" font-style="italic">Valida dados do front-end e coordena</text>
    <text x="400" y="315" text-anchor="middle" font-size="10" fill="#d8b4fe" font-style="italic">a chamada das portas de negócio.</text>

    <!-- Subcaixa: Modelos e Entidades -->
    <rect x="280" y="365" width="240" height="235" rx="10" fill="#1e152a" stroke="#c084fc" stroke-width="1"/>
    <text x="400" y="387" text-anchor="middle" font-size="13" font-weight="800" fill="#e9d5ff">Modelos / Entidades</text>
    <path d="M 300 400 L 500 400" stroke="#3b2b4c" stroke-width="1"/>
    
    <text x="300" y="425" font-size="11.5" fill="#f3e8ff" font-weight="bold">• UsuarioModels.py</text>
    <text x="315" y="442" font-size="10.5" fill="#a78bfa">Entidade Base (UserMixin)</text>
    <text x="300" y="467" font-size="11.5" fill="#f3e8ff" font-weight="bold">• AlunoModels.py</text>
    <text x="315" y="484" font-size="10.5" fill="#a78bfa">Perfil Aluno (Nível Leitura)</text>
    <text x="300" y="509" font-size="11.5" fill="#f3e8ff" font-weight="bold">• ProfessorModels.py</text>
    <text x="315" y="526" font-size="10.5" fill="#a78bfa">Perfil Prof. (Especialidade)</text>
    
    <rect x="295" y="542" width="210" height="46" rx="4" fill="#581c87" fill-opacity="0.3"/>
    <text x="400" y="558" text-anchor="middle" font-size="9.5" fill="#d8b4fe" font-style="italic">Modelos ativos persistidos</text>
    <text x="400" y="574" text-anchor="middle" font-size="9.5" fill="#d8b4fe" font-style="italic">no banco de dados SQLite.</text>
  </g>

  <!-- ==================== CAMADA 3: PORTAS (INTERFACES) ==================== -->
  <g filter="url(#shadow)">
    <rect x="580" y="100" width="220" height="520" rx="16" fill="url(#grad-ports)" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 3" fill-opacity="0.95"/>
    <text x="690" y="128" text-anchor="middle" font-size="14" font-weight="900" fill="#fef08a" letter-spacing="1">PORTAS (INTERFACES ABC)</text>

    <!-- Subcaixa: Driving Ports (Entrada) -->
    <rect x="598" y="150" width="184" height="195" rx="10" fill="#2d0a03" stroke="#fde047" stroke-width="1"/>
    <text x="690" y="172" text-anchor="middle" font-size="12" font-weight="800" fill="#fef9c3">Driving Ports (Entrada)</text>
    <path d="M 610 185 L 770 185" stroke="#4a190c" stroke-width="1"/>
    
    <text x="612" y="206" font-size="12" fill="#fef9c3" font-weight="800">BuscarUsuariosPort</text>
    <text x="612" y="222" font-size="10" fill="#ca8a04" font-family="monospace">buscarUsuarios.py</text>
    
    <text x="615" y="250" font-size="11" fill="#fef08a">• buscar_por_id()</text>
    <text x="615" y="270" font-size="11" fill="#fef08a">• buscar_por_email()</text>
    <text x="615" y="290" font-size="11" fill="#fef08a">• buscar_por_matricula()</text>
    <text x="615" y="310" font-size="11" fill="#fef08a">• buscar_por_cpf()</text>

    <!-- Subcaixa: Driven Ports (Saída) -->
    <rect x="598" y="365" width="184" height="235" rx="10" fill="#2d0a03" stroke="#fde047" stroke-width="1"/>
    <text x="690" y="387" text-anchor="middle" font-size="12" font-weight="800" fill="#fef9c3">Driven Ports (Saída)</text>
    <path d="M 610 400 L 770 400" stroke="#4a190c" stroke-width="1"/>

    <text x="612" y="422" font-size="11" fill="#fef9c3" font-weight="800">SalvarUsuarioPort</text>
    <text x="612" y="436" font-size="9" fill="#ca8a04" font-family="monospace">SalvarUsuario.py</text>

    <text x="612" y="467" font-size="11" fill="#fef9c3" font-weight="800">AtualizarUsuarioPort</text>
    <text x="612" y="481" font-size="9" fill="#ca8a04" font-family="monospace">AtualizarUsuario.py</text>

    <text x="612" y="512" font-size="11" fill="#fef9c3" font-weight="800">DeletarUsuarioPort</text>
    <text x="612" y="526" font-size="9" fill="#ca8a04" font-family="monospace">DeletarUsuario.py</text>
    
    <rect x="608" y="546" width="164" height="44" rx="4" fill="#7c2d12" fill-opacity="0.3"/>
    <text x="690" y="562" text-anchor="middle" font-size="9.5" fill="#fde047" font-style="italic">Contratos abstratos de</text>
    <text x="690" y="578" text-anchor="middle" font-size="9.5" fill="#fde047" font-style="italic">gravação de dados.</text>
  </g>

  <!-- ==================== CAMADA 4: ADAPTADORES ==================== -->
  <g filter="url(#shadow)">
    <rect x="840" y="100" width="270" height="520" rx="16" fill="url(#grad-adapters)" stroke="#10b981" stroke-width="2" stroke-dasharray="6 3" fill-opacity="0.95"/>
    <text x="975" y="128" text-anchor="middle" font-size="14" font-weight="900" fill="#a7f3d0" letter-spacing="1">ADAPTADORES (ADAPTERS)</text>

    <!-- Subcaixa: Database Repository Adapter -->
    <rect x="858" y="150" width="234" height="195" rx="10" fill="#021e17" stroke="#6ee7b7" stroke-width="1"/>
    <text x="975" y="172" text-anchor="middle" font-size="12" font-weight="800" fill="#a7f3d0">Repositório de Banco de Dados</text>
    <path d="M 870 185 L 1080 185" stroke="#0f3c2e" stroke-width="1"/>
    
    <text x="872" y="206" font-size="12" fill="#d1fae5" font-weight="800">DatabaseRepository</text>
    <text x="872" y="222" font-size="10" fill="#059669" font-family="monospace">adapters/repositories/InterfaceDB.py</text>
    
    <rect x="870" y="240" width="210" height="88" rx="4" fill="#047857" fill-opacity="0.15" stroke="#34d399" stroke-width="0.5"/>
    <text x="878" y="258" font-size="10.5" fill="#d1fae5">✓ Implementa todas as portas de CRUD</text>
    <text x="888" y="274" font-size="10" fill="#a7f3d0">(Salvar, Atualizar, Deletar, Buscar)</text>
    <text x="878" y="295" font-size="10.5" fill="#d1fae5">✓ Faz chamadas reais via SQLAlchemy</text>
    <text x="878" y="312" font-size="10.5" fill="#d1fae5">✓ Cria tabelas no DB em tempo de boot</text>

    <!-- Subcaixa: AI Integrations Adapters -->
    <rect x="858" y="365" width="234" height="235" rx="10" fill="#021e17" stroke="#6ee7b7" stroke-width="1"/>
    <text x="975" y="387" text-anchor="middle" font-size="12" font-weight="800" fill="#a7f3d0">Integração com Inteligência Artificial</text>
    <path d="M 870 400 L 1080 400" stroke="#0f3c2e" stroke-width="1"/>

    <text x="872" y="420" font-size="11.5" fill="#d1fae5" font-weight="800">InterfaceAI <tspan font-weight="normal" fill="#a7f3d0">(InterfaceAI.py)</tspan></text>
    <text x="872" y="434" font-size="10.5" fill="#6ee7b7">• gerencia a chamada à API do Gemini</text>
    <text x="872" y="450" font-size="10.5" fill="#6ee7b7" font-weight="bold" fill-opacity="0.9">⚡ Fallback Lúdico integrado offline</text>

    <text x="872" y="482" font-size="11.5" fill="#d1fae5" font-weight="800">GeminiAI <tspan font-weight="normal" fill="#a7f3d0">(GeminiAI.py)</tspan></text>
    <text x="872" y="496" font-size="9.5" fill="#059669" font-family="monospace">conection/api/gemini/GeminiAI.py</text>
    <text x="872" y="515" font-size="10.5" fill="#6ee7b7">• Configura prompt de alfabetização</text>
    <text x="872" y="531" font-size="10.5" fill="#6ee7b7">• Define modelo gemini-2.5-flash</text>
    <text x="872" y="547" font-size="10.5" fill="#6ee7b7">• Retorna estrutura JSON padronizada</text>
    <text x="872" y="563" font-size="10.5" fill="#6ee7b7">• Utiliza carregamento de chaves .env</text>
  </g>

  <!-- ==================== CAMADA EXTERNA: INFRAESTRUTURA FÍSICA ==================== -->
  <!-- Banco SQLite (Superior Direita) -->
  <g filter="url(#shadow)">
    <rect x="885" y="15" width="180" height="55" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="975" y="37" text-anchor="middle" font-size="13" font-weight="800" fill="#38bdf8">SQLite Database</text>
    <text x="975" y="53" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="monospace">instance/database.db</text>
  </g>

  <!-- Google Gemini API Cloud (Inferior Direita) -->
  <g filter="url(#shadow)">
    <rect x="885" y="635" width="180" height="55" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="975" y="657" text-anchor="middle" font-size="13" font-weight="800" fill="#38bdf8">Google Gemini API</text>
    <text x="975" y="673" text-anchor="middle" font-size="10" fill="#94a3b8">gemini-2.5-flash Cloud</text>
  </g>


  <!-- ==================== CONEXÕES E SETAS (FLUXOS) ==================== -->
  
  <!-- 1. Navegador -> Flask Core (Requisições HTTP de Telas) -->
  <path d="M 220 330 C 250 330, 250 250, 272 250" stroke="#38bdf8" stroke-width="2.5" fill="none" marker-end="url(#arrow-cyan)"/>
  <text x="226" y="290" font-size="10.5" font-weight="700" fill="#38bdf8" transform="rotate(-15 226 290)">HTTP Request</text>

  <!-- 2. Flask Core -> Driving Ports (Verificar login/sessão/cadastro na interface Buscar) -->
  <path d="M 520 200 L 590 200" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>
  <text x="555" y="193" text-anchor="middle" font-size="9" font-weight="bold" fill="#38bdf8">Buscas</text>

  <!-- 3. Flask Core -> Driven Ports (Salvar / Registrar Novo Usuário) -->
  <path d="M 520 290 C 560 290, 560 410, 590 410" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>
  <text x="556" y="340" text-anchor="middle" font-size="9" font-weight="bold" fill="#38bdf8">Escrita</text>

  <!-- 4. Flask Core -> AI Adapter (Rota /api/questao chamando InterfaceAI) -->
  <!-- Puxa das rotas do Flask no Core até a InterfaceAI, contornando as portas -->
  <path d="M 520 250 C 560 250, 570 350, 580 350 C 590 350, 800 350, 810 350 C 820 350, 820 420, 850 420" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>
  <text x="568" y="276" text-anchor="middle" font-size="9" font-weight="bold" fill="#38bdf8">Gerar Questão</text>

  <!-- 5. INVERSÃO DE DEPENDÊNCIA (Adaptadores dependendo de Portas para compilar/implementar) -->
  <!-- DatabaseRepository implementa BuscarUsuariosPort -->
  <path d="M 858 215 L 790 215" stroke="#c084fc" stroke-width="2" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-violet)"/>
  <text x="825" y="209" text-anchor="middle" font-size="9" font-weight="bold" fill="#c084fc">implements</text>

  <!-- DatabaseRepository implementa Driven Ports -->
  <path d="M 858 480 C 820 480, 820 480, 790 480" stroke="#c084fc" stroke-width="2" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-violet)"/>
  <text x="825" y="474" text-anchor="middle" font-size="9" font-weight="bold" fill="#c084fc">implements</text>

  <!-- 6. DatabaseRepository -> SQLite (Conexão e comandos SQL) -->
  <path d="M 975 150 L 975 78" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>
  <text x="982" y="112" font-size="9" font-weight="bold" fill="#38bdf8">SQL (db.session)</text>

  <!-- 7. Gemini API Connector -> Gemini API Cloud (Chamadas REST HTTPS) -->
  <path d="M 975 600 L 975 627" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>
  <text x="982" y="618" font-size="9" font-weight="bold" fill="#38bdf8">HTTPS REST</text>


  <!-- ==================== LEGENDA DO DIAGRAMA ==================== -->
  <g filter="url(#shadow)">
    <!-- Caixa da Legenda -->
    <rect x="40" y="635" width="810" height="55" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="90" y="650" font-size="10" font-weight="800" fill="#94a3b8" letter-spacing="1">LEGENDA DO FLUXO:</text>
    
    <!-- Item 1: Fluxo de Execução -->
    <line x1="60" y1="670" x2="100" y2="670" stroke="#38bdf8" stroke-width="3" />
    <circle cx="100" cy="670" r="3" fill="#38bdf8" />
    <text x="110" y="674" font-size="11" fill="#cbd5e1" font-weight="600">Fluxo de Execução em Runtime (Chamada de Métodos / Requisições)</text>

    <!-- Item 2: Inversão de Dependência -->
    <line x1="470" y1="670" x2="510" y2="670" stroke="#c084fc" stroke-width="2" stroke-dasharray="4 3" />
    <circle cx="510" cy="670" r="3" fill="#c084fc" />
    <text x="520" y="674" font-size="11" fill="#cbd5e1" font-weight="600">Direção da Dependência de Código (Inversão de Dependência / Implements)</text>

    <!-- Borda sutil de limite de camada -->
    <rect x="795" y="640" width="45" height="45" fill="none" />
    <line x1="810" y1="645" x2="840" y2="675" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="3 2" />
    <text x="730" y="650" font-size="9" fill="#64748b" text-anchor="end">As bordas coloridas pontilhadas</text>
    <text x="730" y="662" font-size="9" fill="#64748b" text-anchor="end">definem as barreiras das camadas</text>
    <text x="730" y="674" font-size="9" fill="#64748b" text-anchor="end">da arquitetura hexagonal (Domain/Ports/Adapters).</text>
  </g>
</svg>
